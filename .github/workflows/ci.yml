name: Phantom Substrate CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Substrate
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Forensic Dependencies
        run: npm install

      - name: Turbo Validation (Lint & Typecheck)
        run: npx turbo lint typecheck

      - name: Build Verification
        run: npx turbo build --filter=@phantom-labs/dashboard

  engine-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Substrate
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Phantom Engine Deps
        run: |
          pip install ruff pytest
          # Add other dependencies if needed or use requirements.txt

      - name: Engine Lint (Ruff)
        run: ruff check apps/core-engine
