name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # Job 1: Lint, typecheck, and build the Next.js dashboard
  build-dashboard:
    name: Build Dashboard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Dashboard
        run: npm run build --workspace=@phantom-labs/dashboard
        env:
          NEXTAUTH_SECRET: ci_build_secret_placeholder
          NEXTAUTH_URL: http://localhost:3000

  # Job 2: Verify Core Engine Python imports
  verify-engine:
    name: Verify Core Engine
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: apps/core-engine/requirements.txt

      - name: Install Dependencies
        run: pip install -r apps/core-engine/requirements.txt

      - name: Verify Import Chain
        run: |
          cd apps/core-engine
          python -c "from app.main import app; print('✓ Core Engine imports verified')"

      - name: Health Check Smoke Test
        run: |
          cd apps/core-engine
          timeout 10 uvicorn app.main:app --port 8000 &
          sleep 3
          curl -f http://localhost:8000/health || exit 1
          echo "✓ Health endpoint responding"

  # Job 3: Deploy to Vercel (only on push to main)
  deploy:
    name: Deploy to Vercel
    needs: [build-dashboard, verify-engine]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel Environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build for Production
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
