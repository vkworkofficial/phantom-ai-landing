name: Phantom Substrate CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    name: Forensic Validation (Quality Gate)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Substrate
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Forensic Dependencies
        run: npm install

      - name: Substrate Quality Audit (Lint, Typecheck, Build)
        run: npm run quality:audit

  engine-audit:
    name: Engine Hardening Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Substrate
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Phantom Engine Deps
        run: pip install ruff pytest

      - name: Engine Lint (Ruff)
        run: ruff check apps/core-engine

  deployment-audit:
    name: Deployment & Smoke Test (Massive De-bugging)
    needs: [validate, engine-audit]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Substrate
        uses: actions/checkout@v4

      - name: Await Forensic Deployment (Vercel)
        # Note: In a production setup, we use the VERCEL_TOKEN secret.
        # This step verifies the deployment status before proceeding to the smoke test.
        id: vercel-status
        run: |
          echo "🕵️‍♂️ Monitoring Vercel deployment for: tryphantom.dev"
          # Hypothetical integration with 'vercel-cli' or status API
          # For now, we use a placeholder that assumes the auto-deployment is triggered.
          echo "DEPLOYMENT_URL=https://tryphantom.dev" >> $GITHUB_ENV

      - name: Forensic Smoke Test (Quality Guard)
        env:
          DEPLOYMENT_URL: ${{ env.DEPLOYMENT_URL }}
        run: |
          node tooling/smoke-test.mjs $DEPLOYMENT_URL
