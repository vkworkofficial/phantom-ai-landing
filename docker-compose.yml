name: "phantom-substrate"
services:
  core-engine:
    build:
      context: ./apps/core-engine
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./phantom_substrate.db
    volumes:
      - ./apps/core-engine:/app
    restart: unless-stopped

  dashboard:
    image: node:20-alpine
    working_dir: /app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    volumes:
      - ./apps/dashboard:/app
    command: sh -c "npm install && npm run dev"
    depends_on:
      - core-engine
    restart: unless-stopped
