name: "phantom-mvp"
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    volumes:
      - ./backend:/app
    restart: unless-stopped

  frontend:
    # Use the official Node image
    image: node:20-alpine
    working_dir: /app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
    # We use a command to install deps if missing and run the dev server
    command: sh -c "npm install && npm run dev"
    depends_on:
      - backend
    restart: unless-stopped
